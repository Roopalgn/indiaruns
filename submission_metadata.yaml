# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "Gemini"
  - "GitHub Copilot"

ai_usage_summary: |
  Used Claude and Gemini (Antigravity) for architectural guidance, data distribution
  analysis, scoring design, and code review. GitHub Copilot for autocomplete during
  implementation. All engineering decisions (scoring weights, signal selection,
  honeypot logic, reasoning extraction strategy) were made by the human participant
  based on JD analysis and dataset inspection. No candidate data was sent to any
  external API endpoint during ranking execution.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Deterministic multi-stage heuristic ranker. Five scoring components:
  (1) Title relevance with soft multipliers for irrelevant backgrounds.
  (2) Career evidence matching — past elite titles and system-building descriptions
  combining action verbs with ML/search nouns in job history.
  (3) Keyword presence matching with diversity capping (max 5 unique matches, not
  raw frequency) across summary, headline, and career descriptions.
  (4) Experience fit with a smooth penalty away from the 5-9 year target band.
  (5) Location using both city name and country field; outside-India candidates
  penalised unless willing to relocate.
  Company quality scored from company size, industry alignment, and career industry
  diversity. Education tier bonus uses the dataset's pre-computed tier field.
  Platform-validated skill assessment scores provide an additional float-scale
  bonus for relevant skills. Behavioral modifier uses 12 Redrob signals including
  recruiter response rate, inactivity window, notice period, saved_by_recruiters_30d,
  interview_completion_rate, verification status, and work mode preference.
  Honeypots filtered via 5 deterministic checks. Runs in ~2 seconds on CPU.

